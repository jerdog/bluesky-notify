name: Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: bluesky-notify:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Temp fix for cache size
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mkdir -p /tmp/.buildx-cache-new
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Create test environment file
        run: |
          echo "BLUESKY_HANDLE=test" > .env
          echo "BLUESKY_EMAIL=test@example.com" >> .env
          echo "BLUESKY_PASSWORD=test123" >> .env

      - name: Install Docker Compose
        run: |
          DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
          mkdir -p $DOCKER_CONFIG/cli-plugins
          curl -SL https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-linux-x86_64 -o $DOCKER_CONFIG/cli-plugins/docker-compose
          chmod +x $DOCKER_CONFIG/cli-plugins/docker-compose
          docker compose version

      - name: Start containers
        run: |
          docker compose up -d
          sleep 10

      - name: Check container health
        run: |
          docker compose ps
          curl http://localhost:5001/health

      - name: Install pytest in container
        run: |
          docker compose exec -T bluesky-notify pip install pytest pytest-cov

      - name: Run integration tests
        run: |
          docker compose exec -T bluesky-notify python -m pytest tests/test_*.py

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop containers
        run: docker compose down
